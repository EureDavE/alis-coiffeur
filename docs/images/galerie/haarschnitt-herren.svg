<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" role="img" aria-labelledby="title desc">
  <title id="title">Platzhalter Herren Haarschnitt</title>
  <desc id="desc">Platzhalter fuer normales Herren Haarschnitt Bild</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#171717" />
      <stop offset="100%" stop-color="#352713" />
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)" />
  <rect x="120" y="170" width="560" height="660" rx="44" fill="none" stroke="#d7b767" stroke-opacity="0.26" stroke-width="4" />
  <text x="400" y="470" fill="#d7b767" font-family="Oswald, Arial, sans-serif" font-size="70" text-anchor="middle">HERREN FADE</text>
  <text x="400" y="545" fill="#f6e7c1" font-family="Arial, sans-serif" font-size="30" text-anchor="middle">Platzhalter fuer Herren Haarschnitt</text>
  <text x="400" y="730" fill="#cdb27a" font-family="Arial, sans-serif" font-size="26" text-anchor="middle">z. B. Fade, Cut oder Bart Styling</text>
</svg>
